name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.11.5' # Matching your environment's SDK

      - name: Install dependencies
        run: |
          cd schedule_app
          flutter pub get

      - name: Build iOS
        run: |
          cd schedule_app
          flutter build ios --release --no-codesign

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: schedule_app/build/ios/iphoneos/Runner.app
